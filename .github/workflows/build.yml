name: build-exe

# Builds the single-file Windows .exe automatically.
#  * On every tag like v0.1.0  -> publishes a GitHub Release with the .exe attached.
#  * On manual "Run workflow"   -> uploads the .exe as a downloadable artifact.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller Pillow

      - name: Generate icon
        run: python tools/make_icon.py

      - name: Build single-file exe
        run: python build.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MekamonController-windows
          path: dist/MekamonController.exe

      - name: Publish release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MekamonController.exe
          generate_release_notes: true
